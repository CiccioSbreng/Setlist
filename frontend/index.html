<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ConcertHub — scopri concerti ed eventi live nella tua città. Cerca artisti, date e venue, salva i tuoi preferiti e non perdere più uno show."
    />
    <meta name="theme-color" content="#0a0a0f" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ConcertHub" />
    <meta property="og:title" content="ConcertHub — Scopri concerti ed eventi live" />
    <meta
      property="og:description"
      content="Cerca concerti per città e artista, ascolta su Spotify, guarda i video, trova mappa e hotel. Tutto in un posto."
    />
    <meta property="og:image" content="/og-image.svg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ConcertHub — Scopri concerti ed eventi live" />
    <meta
      name="twitter:description"
      content="Cerca concerti per città e artista, ascolta su Spotify, guarda i video, trova mappa e hotel. Tutto in un posto."
    />
    <meta name="twitter:image" content="/og-image.svg" />

    <title>ConcertHub — Scopri concerti ed eventi live</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then((regs) => {
          regs.forEach((r) => r.unregister());
        });
      }
    </script>
  </body>
</html>
